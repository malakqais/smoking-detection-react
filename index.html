<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link style=" width: 700px ;" rel="icon" type="image/svg+xml" href="./src/assets/LOGO.png" />
    <script>
      (function(){ 
        document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'dark'); 
        // Suppress common browser extension noise in console
        const originalWarn = console.warn;
        const originalError = console.error;
        const suppressed = "A listener indicated an asynchronous response";
        console.error = function() {
          if (arguments[0] && typeof arguments[0] === 'string' && arguments[0].includes(suppressed)) return;
          originalError.apply(console, arguments);
        };
      })()
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <title>smoking-detection</title>
  </head>
  <body>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
